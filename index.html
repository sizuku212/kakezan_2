<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掛け算練習｜リボン & おかいもの</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FFF8EC;
    --card:#FFFFFF;
    --ink:#2B2A33;
    --cyan:#28C6D9;
    --cyan-dark:#0FA3B5;
    --coral:#FF7A5C;
    --coral-dark:#E85F41;
    --slate:#7C8AE0;
    --slate-dark:#5D6DD0;
    --ok:#2FB86A;
    --bad:#EF5350;
    --line:#D8CFC0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 90% 0%, #FFEFD8 0%, transparent 45%),
      radial-gradient(circle at 5% 100%, #E7FBFD 0%, transparent 40%),
      var(--paper);
    font-family:'Nunito',sans-serif;
    color:var(--ink);
    padding:32px 16px 60px;
  }
  .wrap{max-width:760px;margin:0 auto;}
  header{text-align:center;margin-bottom:26px;}
  header h1{
    font-family:'Fredoka',sans-serif;
    font-size:28px;
    margin:0 0 6px;
    letter-spacing:.02em;
  }
  header p{margin:0;color:#8A8378;font-size:14px;}

  section.card{
    background:var(--card);
    border-radius:24px;
    padding:22px 22px 24px;
    margin-bottom:20px;
    box-shadow:0 2px 16px rgba(0,0,0,0.05);
  }
  section.card h2{
    font-family:'Fredoka',sans-serif;
    font-size:16px;
    margin:0 0 6px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  section.card h2 .num{
    background:var(--ink);
    color:#fff;
    width:22px;height:22px;border-radius:50%;
    font-size:12px;
    display:inline-flex;align-items:center;justify-content:center;
    font-family:'Nunito',sans-serif;
    font-weight:800;
  }
  .problem-text{
    font-size:14.5px;
    line-height:1.8;
    color:#4A473F;
    background:#FFF8EC;
    border-radius:14px;
    padding:12px 14px;
    margin-bottom:18px;
  }
  .subhead{
    font-family:'Fredoka',sans-serif;
    font-size:13px;
    color:#8A8378;
    margin:18px 0 8px;
    text-align:center;
  }

  /* ---------- ribbon diagram (problem 1) ---------- */
  .ribbon-diagram{margin:6px 0 8px;}
  .ribbon-track-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:18px;
  }
  .ribbon-side-label{
    font-family:'Fredoka',sans-serif;
    font-size:12px;
    width:18px;
    color:#8A8378;
    font-weight:700;
  }
  .ribbon-unit{
    font-family:'Fredoka',sans-serif;
    font-size:13px;
    color:#8A8378;
    font-weight:700;
  }
  .red-ribbon-track{
    height:34px;
    border-radius:8px;
    background:linear-gradient(135deg,var(--coral),var(--coral-dark));
    display:flex;
    align-items:center;
    justify-content:center;
    transition:width .2s ease;
  }
  .ribbon-input{
    width:58px; height:26px;
    text-align:center;
    border:2px solid var(--ink);
    border-radius:8px;
    font-family:'Fredoka',sans-serif;
    font-size:14px;
    font-weight:600;
    background:#fff;
    outline:none;
  }
  .ribbon-input:focus{border-color:var(--cyan-dark);}

  .blue-ribbon-outer{
    position:relative;
    flex:1 1 auto;
    max-width:700px;
    margin-top:26px;
    height:44px;
  }
  .zero-label{
    position:absolute;
    left:-6px; top:-26px;
    font-weight:800;
    font-family:'Fredoka',sans-serif;
    font-size:14px;
    color:#8A8378;
  }
  .blue-ribbon-track-bg{
    position:absolute;
    top:19px; left:0; right:0;
    height:30px;
    background:var(--line);
    border-radius:8px;
  }
  .blue-ribbon-fill{
    position:absolute;
    top:19px; left:0;
    height:30px;
    width:0;
    background:linear-gradient(135deg,var(--cyan),var(--cyan-dark));
    border-radius:8px;
    pointer-events:none;
    transition:width .03s linear;
  }
  .value-tick{
    position:absolute;
    top:2px;
    width:2px; height:16px;
    background:#9CA3AF;
    opacity:.7;
    transform:translateX(-50%);
  }
  input[type=range].slider{
    position:absolute;
    top:2px; left:0;
    width:700px;
    -webkit-appearance:none;
    appearance:none;
    background:transparent;
    margin:0;
    height:44px;
  }
  input[type=range].slider::-webkit-slider-runnable-track{
    height:4px; background:transparent;
  }
  input[type=range].slider::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:26px;height:44px;
    margin-top:0px;
    border-radius:50%;
    background:var(--cyan);
    border:3px solid var(--cyan-dark);
    cursor:pointer;
    box-shadow:0 2px 4px rgba(0,0,0,.2);
  }
  input[type=range].slider::-moz-range-track{height:4px;background:transparent;}
  input[type=range].slider::-moz-range-thumb{
    width:20px;height:38px;border-radius:50%;
    background:var(--cyan); border:3px solid var(--cyan-dark);
    cursor:pointer;
  }
  .line-marker{
    position:absolute;
    top:-30px;
    transform:translateX(-50%);
    display:none;
    text-align:center;
    pointer-events:none;
  }
  .line-marker.show{display:block;}
  .line-marker .tri{
    width:0;height:0;
    margin:0 auto;
    border-left:7px solid transparent;
    border-right:7px solid transparent;
    border-top:9px solid var(--ok);
  }
  .line-marker .marklabel{
    background:var(--ok);
    color:#fff;
    font-size:10px;
    font-weight:800;
    border-radius:6px;
    padding:2px 6px;
    white-space:nowrap;
    margin-top:2px;
  }
  .line-marker .stem{
    position:absolute;
    left:50%; top:26px;
    width:2px; height:24px;
    background:var(--ok);
    transform:translateX(-50%);
    opacity:.6;

  }

  /* ---------- expression rows (式) ---------- */
  .expr-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    margin:8px 0 4px;
  }
  .expr-box{
    width:66px; height:56px;
    border:3px solid var(--ink);
    border-radius:12px;
    text-align:center;
    font-family:'Fredoka',sans-serif;
    font-size:20px;
    font-weight:600;
    background:#fff;
    outline:none;
  }
  .expr-box:focus{border-color:var(--cyan-dark);}
  .expr-op{
    font-family:'Fredoka',sans-serif;
    font-size:26px;
    font-weight:700;
  }
  .expr-eq{font-family:'Fredoka',sans-serif; font-size:22px; font-weight:700; color:#8A8378;}

  /* ---------- answer rows (答え) ---------- */
  .answer-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-top:6px;
  }
  .answer-box{
    width:96px; height:52px;
    border:3px solid var(--ink);
    border-radius:12px;
    text-align:center;
    font-family:'Fredoka',sans-serif;
    font-size:20px;
    outline:none;
  }
  .answer-box:focus{border-color:var(--cyan-dark);}
  .answer-suffix{font-weight:800; font-size:15px; color:#8A8378;}

  /* ---------- coin builder (problem 2 diagram) ---------- */
  .coin-builder{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
  }
  .coin-total-display{
    font-family:'Fredoka',sans-serif;
    font-size:26px;
    font-weight:600;
    background:#fff;
    border:3px solid var(--ink);
    border-radius:14px;
    padding:8px 22px;
    min-width:140px;
    text-align:center;
  }
  .coin-total-display .yen{font-size:15px; color:#8A8378; margin-left:2px;}
  .coin-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .coin-btn{
    width:54px; height:54px;
    border-radius:50%;
    border:3px solid var(--ink);
    font-family:'Fredoka',sans-serif;
    font-weight:700;
    font-size:12px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--ink);
    transition:transform .08s ease;
  }
  .coin-btn:active{transform:scale(.9);}
  .coin-btn.c1{background:#F2F2EF;}
  .coin-btn.c5{background:#F4D35E;}
  .coin-btn.c10{background:#D98E4A; color:#fff;}
  .coin-btn.c50{background:#E7E7E4;}
  .coin-btn.c100{background:#C9D0D6;}
  .reset-btn{
    border:none;
    border-radius:999px;
    padding:9px 22px;
    font-weight:800;
    font-family:'Nunito',sans-serif;
    font-size:13px;
    background:#EDEAE2;
    color:var(--ink);
    cursor:pointer;
  }
  .reset-btn:hover{background:#E1DDD1;}

  /* ---------- money copies ---------- */
  .money-section{
    display:flex;
    gap:24px;
    align-items:flex-start;
    flex-wrap:wrap;
    margin-top:18px;
  }
  .money-copies-panel{flex:1 1 240px; min-width:240px;}
  .money-copies-row{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    min-height:60px;
    align-items:center;
    padding:10px;
    border:2px dashed var(--line);
    border-radius:14px;
    margin-bottom:12px;
  }
  .money-copy{
    display:flex;
    flex-wrap:wrap;
    align-content:flex-start;
    gap:2px;
    width:46px;
    min-height:40px;
    padding:5px;
    border:1px solid #E3DCCE;
    border-radius:8px;
    background:#fff;
  }
  .mini-coin{width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,.35);}
  .mini-coin.c1{background:#F2F2EF;}
  .mini-coin.c5{background:#F4D35E;}
  .mini-coin.c10{background:#D98E4A;}
  .mini-coin.c50{background:#E7E7E4;}
  .mini-coin.c100{background:#C9D0D6;}
  .copies-controls{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
  }
  .copies-controls .count{
    font-family:'Fredoka',sans-serif;
    font-size:20px;
    min-width:44px;
    text-align:center;
  }
  .pillbtn{
    border:none;
    border-radius:999px;
    padding:10px 18px;
    font-weight:800;
    font-family:'Nunito',sans-serif;
    font-size:13px;
    cursor:pointer;
    color:#fff;
    transition:transform .08s ease, filter .12s ease;
  }
  .pillbtn:active{transform:scale(.94);}
  .pillbtn.decrease{background:var(--slate);}
  .pillbtn.decrease:hover{background:var(--slate-dark);}
  .pillbtn.increase{background:var(--coral);}
  .pillbtn.increase:hover{background:var(--coral-dark);}

  .auto-expr{
    font-family:'Fredoka',sans-serif;
    font-size:15px;
    text-align:center;
    margin:6px 0 14px;
    color:#4A473F;
    word-break:break-word;
  }

  /* ---------- footer / results ---------- */
  .actions{display:flex; justify-content:center; margin-top:8px;}
  .answer-btn{
    background:var(--ok);
    color:#fff;
    border:none;
    font-family:'Fredoka',sans-serif;
    font-size:18px;
    font-weight:600;
    padding:14px 46px;
    border-radius:999px;
    cursor:pointer;
    box-shadow:0 6px 0 #1E8A4E;
    transition:transform .08s ease;
  }
  .answer-btn:active{transform:translateY(4px); box-shadow:0 2px 0 #1E8A4E;}

  .results{
    margin-top:20px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
  }
  .result-tile{
    border-radius:16px;
    padding:14px 12px;
    text-align:center;
    font-weight:800;
    font-size:13px;
    border:2px solid transparent;
  }
  .result-tile.pending{background:#F4F1EA; color:#A79E8E;}
  .result-tile.ok{background:#E7F9EE; color:var(--ok); border-color:var(--ok);}
  .result-tile.bad{background:#FDECEC; color:var(--bad); border-color:var(--bad);}
  .result-tile .big{display:block; font-size:20px; margin-bottom:2px;}
  .result-tile .hint{
    display:block;
    margin-top:6px;
    font-size:11.5px;
    font-weight:700;
    color:#B5482F;
    line-height:1.5;
  }

  .next-wrap{text-align:center; margin-top:18px;}
  .next-btn{
    background:none;
    border:2px solid var(--ink);
    color:var(--ink);
    font-family:'Nunito',sans-serif;
    font-weight:800;
    padding:10px 26px;
    border-radius:999px;
    cursor:pointer;
    display:none;
  }
  .next-btn.show{display:inline-block;}
  .next-btn:hover{background:var(--ink); color:#fff;}

  @media (max-width:700px){
    input[type=range].slider{width:100%;}
    .blue-ribbon-outer{max-width:100%;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>掛け算練習</h1>
    <p>リボンとおかいもの、図と式で表そう</p>
  </header>

  <!-- ============ PROBLEM 1: RIBBON ============ -->
  <section class="card">
    <h2><span class="num">1</span>問題文</h2>
    <div class="problem-text" id="problem1Text"></div>

    <div class="subhead">図で表そう：赤のリボンに数を入力し、青のリボンの長さを合わせよう</div>
    <div class="ribbon-diagram">
      <div class="ribbon-track-row">
        <div class="ribbon-side-label">赤</div>
        <div class="red-ribbon-track" id="redRibbonTrack">
          <input type="text" inputmode="numeric" maxlength="3" id="numInput" class="ribbon-input" placeholder="?">
        </div>
        <div class="ribbon-unit">cm</div>
      </div>
      <div class="ribbon-track-row">
        <div class="ribbon-side-label">青</div>
        <div class="blue-ribbon-outer" id="blueRibbonOuter">
          <div class="blue-ribbon-track-bg"></div>
          <div class="blue-ribbon-fill" id="trackFill"></div>
          <div id="valueTicks"></div>
          <input type="range" class="slider" id="slider" min="0" max="700" value="0" step="1">
          <div class="line-marker" id="lineMarker">
            <div class="stem"></div>
            <div class="tri"></div>
            <div class="marklabel" id="lineMarkerLabel"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="subhead">式で表そう</div>
    <div class="expr-row">
      <input type="text" inputmode="numeric" maxlength="4" class="expr-box" id="exprBox1a" placeholder="?">
      <div class="expr-op">×</div>
      <input type="text" inputmode="numeric" maxlength="4" class="expr-box" id="exprBox1b" placeholder="?">
    </div>

    <div class="subhead">答えを書こう</div>
    <div class="answer-row">
      <input type="text" inputmode="numeric" maxlength="5" class="answer-box" id="answerBox1">
      <div class="answer-suffix">cm</div>
    </div>
  </section>

  <!-- ============ PROBLEM 2: MONEY ============ -->
  <section class="card">
    <h2><span class="num">2</span>問題文</h2>
    <div class="problem-text" id="problem2Text"></div>

    <div class="subhead">図で表そう：1個分のお金をコインで作ろう</div>
    <div class="coin-builder">
      <div class="coin-total-display" id="coinTotalDisplay">0<span class="yen">円</span></div>
      <div class="coin-row">
        <button class="coin-btn c100" data-v="100">100</button>
        <button class="coin-btn c50" data-v="50">50</button>
        <button class="coin-btn c10" data-v="10">10</button>
        <button class="coin-btn c5" data-v="5">5</button>
        <button class="coin-btn c1" data-v="1">1</button>
      </div>
      <button class="reset-btn" id="coinResetBtn">↺ もどす</button>
    </div>

    <div class="money-section">
      <div class="money-copies-panel" style="flex:1 1 100%;">
        <div class="subhead" style="margin-top:0;">コピーの数（買う個数）</div>
        <div class="money-copies-row" id="moneyCopiesRow"></div>
        <div class="copies-controls">
          <button class="pillbtn decrease" id="moneyDecreaseBtn">減らす</button>
          <div class="count" id="moneyCopyCountLabel">1</div>
          <button class="pillbtn increase" id="moneyIncreaseBtn">増やす</button>
        </div>
      </div>
    </div>

    <div class="subhead">式</div>
    <div class="auto-expr" id="autoExpr">0円</div>

    <div class="subhead">答えを書こう</div>
    <div class="answer-row">
      <input type="text" inputmode="numeric" maxlength="6" class="answer-box" id="answerBox2">
      <div class="answer-suffix">円</div>
    </div>
  </section>

  <div class="actions">
    <button class="answer-btn" id="answerBtn">解答する</button>
  </div>

  <div class="results">
    <div class="result-tile pending" id="r1line"><span class="big">📏</span>問題1・図：未回答</div>
    <div class="result-tile pending" id="r1expr"><span class="big">✏️</span>問題1・式：未回答</div>
    <div class="result-tile pending" id="r1ans"><span class="big">🔢</span>問題1・答え：未回答</div>
    <div class="result-tile pending" id="r2diag"><span class="big">🪙</span>問題2・図：未回答</div>
    <div class="result-tile pending" id="r2ans"><span class="big">🔢</span>問題2・答え：未回答</div>
  </div>

  <div class="next-wrap">
    <button class="next-btn" id="nextBtn">次の問題へ →</button>
  </div>
</div>

<script>
(function(){
  const LINE_MAX = 700;
  const MAX_FACTOR = 9;
  const TOLERANCE = BOX_DIST/3;
  const BOX_DIST_ABS_MIN = 60;
  const MIN_COPIES = 1;
  const MAX_COPIES = 9;

  let a, b;
  let BOX_DIST = BOX_DIST_ABS_MIN;
  let answered = false;

  // problem 2 state
  let coinComposition = []; // list of denominations clicked, in order
  let moneyCopyCount = 1;

  // ---- DOM refs ----
  const problem1Text = document.getElementById('problem1Text');
  const problem2Text = document.getElementById('problem2Text');
  const redRibbonTrack = document.getElementById('redRibbonTrack');

  const numInput = document.getElementById('numInput');
  const slider = document.getElementById('slider');
  const trackFill = document.getElementById('trackFill');
  const valueTicks = document.getElementById('valueTicks');
  const lineMarker = document.getElementById('lineMarker');
  const lineMarkerLabel = document.getElementById('lineMarkerLabel');

  const exprBox1a = document.getElementById('exprBox1a');
  const exprBox1b = document.getElementById('exprBox1b');
  const answerBox1 = document.getElementById('answerBox1');

  const coinTotalDisplay = document.getElementById('coinTotalDisplay');
  const coinResetBtn = document.getElementById('coinResetBtn');
  const moneyCopiesRow = document.getElementById('moneyCopiesRow');
  const moneyCopyCountLabel = document.getElementById('moneyCopyCountLabel');
  const moneyDecreaseBtn = document.getElementById('moneyDecreaseBtn');
  const moneyIncreaseBtn = document.getElementById('moneyIncreaseBtn');
  const autoExpr = document.getElementById('autoExpr');
  const answerBox2 = document.getElementById('answerBox2');

  const answerBtn = document.getElementById('answerBtn');
  const nextBtn = document.getElementById('nextBtn');

  const r1line = document.getElementById('r1line');
  const r1expr = document.getElementById('r1expr');
  const r1ans = document.getElementById('r1ans');
  const r2diag = document.getElementById('r2diag');
  const r2ans = document.getElementById('r2ans');

  function randA(){ return (1 + Math.floor(Math.random()*50)) * 10; } // 10..500 step 10
  function randB(){ return 1 + Math.floor(Math.random()*9); }         // 1..9

  function digitsOnly(el, maxLen){
    el.value = el.value.replace(/[^0-9]/g,'').slice(0, maxLen);
  }

  // ---------------- number line (problem 1 diagram) ----------------
  function updateTrackFill(){
    trackFill.style.width = slider.value + 'px';
  }
  slider.addEventListener('input', updateTrackFill);

  function updateValueTicks(){
    valueTicks.innerHTML = '';
    // Ticks are fixed (do not recalculate as the student types) -- plain
    // gray reference marks spaced by the box's own fixed pixel offset.
    for(let k = 1; k <= MAX_FACTOR; k++){
      const pos = BOX_DIST * k;
      if(pos > LINE_MAX) break;
      const tick = document.createElement('div');
      tick.className = 'value-tick';
      tick.style.left = pos + 'px';
      valueTicks.appendChild(tick);
    }
  }

  numInput.addEventListener('input', () => { digitsOnly(numInput, 3); });

  // ---------------- ribbon visual ----------------
  // The red ribbon's pixel width IS the "a" scale unit (BOX_DIST): it stays
  // fixed regardless of what's typed, exactly like the old input-box offset did.
  function renderRibbons(){
    redRibbonTrack.style.width = BOX_DIST + 'px';
  }

  // ---------------- coin builder (problem 2 diagram) ----------------
  function coinTotal(){
    return coinComposition.reduce((s,v)=>s+v, 0);
  }
  function renderCoinTotal(){
    coinTotalDisplay.innerHTML = coinTotal() + '<span class="yen">円</span>';
  }
  document.querySelectorAll('.coin-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if(answered) return;
      coinComposition.push(parseInt(btn.dataset.v,10));
      renderCoinTotal();
      renderMoneyCopies();
      renderAutoExpr();
    });
  });
  coinResetBtn.addEventListener('click', () => {
    if(answered) return;
    coinComposition = [];
    renderCoinTotal();
    renderMoneyCopies();
    renderAutoExpr();
  });

  function renderMoneyCopies(){
    moneyCopiesRow.innerHTML = '';
    for(let c = 0; c < moneyCopyCount; c++){
      const copy = document.createElement('div');
      copy.className = 'money-copy';
      coinComposition.forEach(v => {
        const dot = document.createElement('div');
        dot.className = 'mini-coin c' + v;
        copy.appendChild(dot);
      });
      moneyCopiesRow.appendChild(copy);
    }
  }

  moneyDecreaseBtn.addEventListener('click', () => {
    if(answered) return;
    if(moneyCopyCount > MIN_COPIES){
      moneyCopyCount--;
      moneyCopyCountLabel.textContent = moneyCopyCount;
      renderMoneyCopies();
      renderAutoExpr();
    }
  });
  moneyIncreaseBtn.addEventListener('click', () => {
    if(answered) return;
    if(moneyCopyCount < MAX_COPIES){
      moneyCopyCount++;
      moneyCopyCountLabel.textContent = moneyCopyCount;
      renderMoneyCopies();
      renderAutoExpr();
    }
  });

  function renderAutoExpr(){
    const t = coinTotal();
    const terms = [];
    for(let i=0;i<moneyCopyCount;i++) terms.push(t);
    autoExpr.textContent = terms.join(' + ') + '円';
  }

  // ---------------- expression / answer input filters ----------------
  [exprBox1a, exprBox1b].forEach(el => el.addEventListener('input', () => digitsOnly(el, 4)));
  answerBox1.addEventListener('input', () => digitsOnly(answerBox1, 5));
  answerBox2.addEventListener('input', () => digitsOnly(answerBox2, 6));

  // ---------------- result tile helpers ----------------
  function setTilePending(el, icon, text){
    el.className = 'result-tile pending';
    el.innerHTML = '<span class="big">'+icon+'</span>'+text;
  }
  function setTileResult(el, ok, label, hint){
    el.className = 'result-tile ' + (ok ? 'ok' : 'bad');
    el.innerHTML = '<span class="big">'+(ok?'⭕':'❌')+'</span>'+label
      + (hint ? '<span class="hint">'+hint+'</span>' : '');
  }

  // ---------------- new round ----------------
  function newProblem(){
    a = randA();
    b = randB();

    problem1Text.textContent = '赤のリボンは' + a + 'cmです。青のリボンは赤のリボンの' + b + '倍です。青のリボンは何cmですか。図と式で表してこたえなさい。';
    problem2Text.textContent = a + '円の物を' + b + '個買います。合計いくらになりますか。図と式で表して答えなさい。';

    // box distance sized from b (the only multiplier used here),
    // always at least 60px, always fits the line for up to ×9
    const boxDistMax = Math.max(BOX_DIST_ABS_MIN, Math.floor(LINE_MAX / b));
    BOX_DIST = BOX_DIST_ABS_MIN + Math.floor(Math.random() * (boxDistMax - BOX_DIST_ABS_MIN + 1));
    renderRibbons();

    numInput.value = '';
    slider.value = 0;
    numInput.disabled = false;
    slider.disabled = false;
    updateTrackFill();
    updateValueTicks();
    lineMarker.classList.remove('show');

    // expression + answer (problem 1)
    exprBox1a.value = '';
    exprBox1b.value = '';
    answerBox1.value = '';
    exprBox1a.disabled = false;
    exprBox1b.disabled = false;
    answerBox1.disabled = false;

    // money (problem 2)
    coinComposition = [];
    moneyCopyCount = 1;
    moneyCopyCountLabel.textContent = moneyCopyCount;
    renderCoinTotal();
    renderMoneyCopies();
    renderAutoExpr();
    answerBox2.value = '';
    answerBox2.disabled = false;
    document.querySelectorAll('.coin-btn').forEach(btn => btn.disabled = false);
    coinResetBtn.disabled = false;
    moneyDecreaseBtn.disabled = false;
    moneyIncreaseBtn.disabled = false;

    // results
    setTilePending(r1line, '📏', '問題1・図：未回答');
    setTilePending(r1expr, '✏️', '問題1・式：未回答');
    setTilePending(r1ans, '🔢', '問題1・答え：未回答');
    setTilePending(r2diag, '🪙', '問題2・図：未回答');
    setTilePending(r2ans, '🔢', '問題2・答え：未回答');

    answered = false;
    answerBtn.disabled = false;
    nextBtn.classList.remove('show');
  }

  // ---------------- grading ----------------
  function checkAnswer(){
    if(answered) return;
    answered = true;
    answerBtn.disabled = true;
    numInput.disabled = true;
    slider.disabled = true;
    exprBox1a.disabled = true;
    exprBox1b.disabled = true;
    answerBox1.disabled = true;
    document.querySelectorAll('.coin-btn').forEach(btn => btn.disabled = true);
    coinResetBtn.disabled = true;
    moneyDecreaseBtn.disabled = true;
    moneyIncreaseBtn.disabled = true;
    answerBox2.disabled = true;

    // ---- Problem 1: number line (fixed roles -- box must be a, slider must be a*b) ----
    const typedA = parseInt(numInput.value, 10);
    const sliderPx = parseInt(slider.value, 10);
    const expectedSliderPx = BOX_DIST * b;
    const lineOk = (typedA === a) && Math.abs(sliderPx - expectedSliderPx) <= TOLERANCE;

    lineMarker.style.left = expectedSliderPx + 'px';
    lineMarkerLabel.textContent = a + '×' + b;
    lineMarker.classList.add('show');

    let lineHint;
    if(lineOk){
      lineHint = '正解の位置は図の通りです。';
    }else{
      lineHint = '入力欄には赤のリボンの長さ「'+a+'」を入れ、スライダーは図の位置（'+a+'×'+b+'）に合わせましょう。';
    }
    setTileResult(r1line, lineOk, '問題1・図：' + (lineOk?'正解！':'不正解'), lineHint);

    // ---- Problem 1: expression (swappable order) ----
    const v1 = parseInt(exprBox1a.value, 10);
    const v2 = parseInt(exprBox1b.value, 10);
    const exprOk = (v1 === a && v2 === b) || (v1 === b && v2 === a);
    const exprHint = exprOk ? null : ('正解例：'+a+'×'+b+'（または'+b+'×'+a+'）');
    setTileResult(r1expr, exprOk, '問題1・式：' + (exprOk?'正解！':'不正解'), exprHint);

    // ---- Problem 1: final answer ----
    const ans1 = parseInt(answerBox1.value, 10);
    const ans1Ok = ans1 === a*b;
    const ans1Hint = ans1Ok ? null : ('正解：'+(a*b)+'cm');
    setTileResult(r1ans, ans1Ok, '問題1・答え：' + (ans1Ok?'正解！':'不正解'), ans1Hint);

    // ---- Problem 2: diagram (coins must equal a, copies must equal b) ----
    const total = coinTotal();
    const diag2Ok = (total === a) && (moneyCopyCount === b);
    let diag2Hint;
    if(diag2Ok){
      diag2Hint = null;
    }else{
      diag2Hint = '正解：1個分のお金を'+a+'円に、コピーの数を'+b+'個にしましょう。';
    }
    setTileResult(r2diag, diag2Ok, '問題2・図：' + (diag2Ok?'正解！':'不正解'), diag2Hint);

    // ---- Problem 2: final answer ----
    const ans2 = parseInt(answerBox2.value, 10);
    const ans2Ok = ans2 === a*b;
    const ans2Hint = ans2Ok ? null : ('正解：'+(a*b)+'円');
    setTileResult(r2ans, ans2Ok, '問題2・答え：' + (ans2Ok?'正解！':'不正解'), ans2Hint);

    nextBtn.classList.add('show');
  }

  answerBtn.addEventListener('click', checkAnswer);
  nextBtn.addEventListener('click', newProblem);

  newProblem();
})();
</script>
</body>
</html>
